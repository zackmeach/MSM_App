name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Inject version
        run: python scripts/inject_version.py --version ${{ steps.version.outputs.VERSION }}

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/unit/test_artifacts_validation.py --ignore=tests/unit/test_diff_builder.py --ignore=tests/unit/test_pipeline_schemas.py

      - name: Seed content database
        run: python scripts/seed_content_db.py

      - name: Generate assets
        run: |
          python scripts/generate_assets.py
          python scripts/generate_icon.py

      - name: Verify bundle
        run: python scripts/verify_bundle.py

      - name: Build with PyInstaller
        run: python -m PyInstaller msm_tracker.spec --clean --noconfirm

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.VERSION }} installer\msm_tracker.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MSM Awakening Tracker v${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: true
          files: dist/MSMAwakeningTracker-Setup-${{ steps.version.outputs.VERSION }}.exe
