name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Seed content database
        run: python scripts/seed_content_db.py

      - name: Generate placeholder assets
        run: python scripts/generate_assets.py

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Verify publish dry-run
        run: python scripts/publish_content.py --content-version 0.0.0-ci --dry-run
